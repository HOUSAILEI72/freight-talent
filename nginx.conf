# nginx.conf — ACE-Talent 生产 Nginx 配置
#
# 流量入口层：对外暴露 80 / 443，内部分发到各服务：
#   /api/v2/*   → FastAPI  (fastapi:8000)
#   /api/*      → Flask    (backend:5000)
#   /socket.io/ → Flask    (backend:5000)  WebSocket
#   /*          → React SPA 静态资源
#
# 部署前替换：将所有 yourdomain.com 改为实际域名
# SSL 证书：将 fullchain.pem + privkey.pem 放到 CVM 的 /etc/ssl/cert/ 目录

# ── 限流 zone（必须在 http 上下文层，server 块外） ───────────────────────────
limit_req_zone  $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── IP 直接访问（备案期间临时允许） ─────────────────────────────────────────
server {
    listen 80  default_server;
    listen 443 ssl default_server;
    server_name _;
    ssl_certificate     /etc/ssl/cert/fullchain.pem;
    ssl_certificate_key /etc/ssl/cert/privkey.pem;

    root  /usr/share/nginx/html;
    index index.html;

    location /api/v2/ {
        proxy_pass http://fastapi:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /socket.io/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }
    location = /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── HTTP → HTTPS 重定向 ───────────────────────────────────────────────────────
server {
    listen 80;
    server_name globalogin.com www.globalogin.com;

    # Let's Encrypt / certbot 续签专用（HTTPS 生效后保留此块）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS 主服务 ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name globalogin.com www.globalogin.com;

    # SSL 证书（由 docker-compose volumes 挂载 /etc/ssl/cert:ro）
    ssl_certificate     /etc/ssl/cert/fullchain.pem;
    ssl_certificate_key /etc/ssl/cert/privkey.pem;

    # 现代 TLS 配置
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    root  /usr/share/nginx/html;
    index index.html;

    # 最大上传 15 MB（与 Flask MAX_CONTENT_LENGTH=10MB 保持余量）
    client_max_body_size 15m;

    # Gzip 压缩
    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        image/svg+xml;

    # 安全响应头
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' wss://globalogin.com wss://www.globalogin.com;" always;

    # ── 静态资源长缓存 ────────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires            1y;
        add_header Cache-Control "public, immutable";
        access_log         off;
    }

    # ── FastAPI — /api/v2/* ───────────────────────────────────────────────────
    location /api/v2/ {
        limit_req  zone=api_limit burst=50 nodelay;
        limit_conn conn_limit 20;
        proxy_pass         http://fastapi:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout   120s;
    }

    # ── Flask — /api/* ────────────────────────────────────────────────────────
    location /api/ {
        limit_req  zone=api_limit burst=50 nodelay;
        limit_conn conn_limit 20;
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout   120s;
    }

    # ── Flask-SocketIO — WebSocket ────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering    off;
    }

    # ── 容器健康检查端点 ──────────────────────────────────────────────────────
    location = /health {
        access_log  off;
        return 200  'ok';
        add_header  Content-Type text/plain;
    }

    # ── React SPA fallback ────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
