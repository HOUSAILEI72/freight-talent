# nginx.conf — FreightTalent 生产 Nginx 配置
#
# 流量入口层：统一对外暴露 80 / 443，内部分发到各服务：
#   /api/v2/*   → FastAPI  (fastapi:8000)   新增模块
#   /api/*      → Flask    (backend:5000)   存量接口
#   /socket.io/ → Flask    (backend:5000)   WebSocket
#   /*          → 前端静态资源 (本地 dist)
#
# 注意：Nginx 使用最长前缀匹配，/api/v2/ 自然优先于 /api/，
#       但显式写在前面保持可读性。

# ── HTTP ─────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;               # 生产替换为你的域名，如 yourdomain.com

    # ── HTTPS 重定向（SSL 配置好之后取消注释） ──────────────────────────────
    # return 301 https://$host$request_uri;

    # ── Let's Encrypt ACME challenge（certbot 续签） ─────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── 全局设置 ──────────────────────────────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    # 最大上传 15 MB（与 Flask MAX_CONTENT_LENGTH=10MB 保持余量）
    client_max_body_size 15m;

    # Gzip 压缩（减少 JS/CSS/JSON 传输体积）
    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        image/svg+xml;

    # 基础安全响应头
    add_header X-Frame-Options        "SAMEORIGIN"                        always;
    add_header X-Content-Type-Options "nosniff"                           always;
    add_header X-XSS-Protection       "1; mode=block"                     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"   always;

    # ── 静态资源长缓存 ────────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires            1y;
        add_header Cache-Control "public, immutable";
        access_log         off;
    }

    # ── FastAPI — /api/v2/* ───────────────────────────────────────────────────
    # 必须写在 /api/ 之前（虽然 Nginx 最长匹配会自动选对，但显式顺序更清晰）
    location /api/v2/ {
        proxy_pass         http://fastapi:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout   120s;
    }

    # ── Flask — /api/* ────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout   120s;
    }

    # ── Flask-SocketIO — WebSocket ────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass          http://backend:5000;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;          # WebSocket 保持长连接
        proxy_send_timeout  3600s;
        proxy_buffering     off;            # 不缓冲 WebSocket 帧
    }

    # ── 容器健康检查专用端点（不走 try_files，始终返回 200） ──────────────────
    location = /health {
        access_log  off;
        return 200  'ok';
        add_header  Content-Type text/plain;
    }

    # ── React SPA fallback ────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}

