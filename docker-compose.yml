# FreightTalent 生产 Docker Compose
# 数据库：腾讯云轻量数据库（外部），在 .env 中配置 DB_HOST / DB_USER / DB_PASSWORD
# 使用前：cp .env.example .env 并填写凭据
# 启动：docker compose up -d --build
# 首次建表：docker compose exec backend flask db upgrade

services:
  # ── Redis 7 ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - app_net
    expose:
      - "6379"
    mem_limit: 512M
    cpus: "0.5"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── Flask / Gunicorn（存量 API + Socket.IO） ─────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-freight_talent}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ACCESS_TOKEN_EXPIRES_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRES_MINUTES:-15}
      JWT_REFRESH_TOKEN_EXPIRES_DAYS: ${JWT_REFRESH_TOKEN_EXPIRES_DAYS:-7}
      REDIS_URL: redis://redis:6379/0
      RATELIMIT_STORAGE_URI: redis://redis:6379/0
      CORS_ORIGINS: ${CORS_ORIGINS}
      SERVE_STATIC: "false"
      GUNICORN_BIND: "0.0.0.0:5000"
      ENABLE_SOCKETIO: "true"
      SENTRY_DSN: ${SENTRY_DSN:-}
      COS_SECRET_ID: ${COS_SECRET_ID:-}
      COS_SECRET_KEY: ${COS_SECRET_KEY:-}
      COS_BUCKET: ${COS_BUCKET:-}
      COS_REGION: ${COS_REGION:-ap-guangzhou}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAIL_HOST: ${MAIL_HOST:-smtp.exmail.qq.com}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USE_SSL: ${MAIL_USE_SSL:-true}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_DEFAULT_SENDER: ${MAIL_DEFAULT_SENDER:-ACE-Talent <noreply@yourdomain.com>}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - app_net
    expose:
      - "5000"
    mem_limit: 1536M
    cpus: "2.0"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5000/api/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── FastAPI（新增模块，/api/v2/*） ────────────────────────────────────────────
  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile.fastapi
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-freight_talent}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: ${CORS_ORIGINS}
      DEBUG: "false"
      SENTRY_DSN: ${SENTRY_DSN:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      COS_SECRET_ID: ${COS_SECRET_ID:-}
      COS_SECRET_KEY: ${COS_SECRET_KEY:-}
      COS_BUCKET: ${COS_BUCKET:-}
      COS_REGION: ${COS_REGION:-ap-guangzhou}
      COS_CDN_DOMAIN: ${COS_CDN_DOMAIN:-}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - app_net
    expose:
      - "8000"
    mem_limit: 768M
    cpus: "1.5"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/v2/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Nginx + React SPA（唯一对外入口） ────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
        SENTRY_ORG: ${SENTRY_ORG:-}
        SENTRY_PROJECT: ${SENTRY_PROJECT:-}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      fastapi:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/ssl/cert:/etc/ssl/cert:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - app_net
    mem_limit: 128M
    cpus: "0.5"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  redis_data:
  uploads_data:

networks:
  app_net:
    driver: bridge
